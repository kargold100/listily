# ══════════════════════════════════════════════════════════════════
#  Listily.au — Netlify Configuration
#  Place this file at the ROOT of your repository (not inside docs/)
# ══════════════════════════════════════════════════════════════════

# ── Build settings ─────────────────────────────────────────────────
[build]
  # Listily is pure static HTML/CSS/JS — no build command needed.
  # Netlify just serves the docs/ folder directly.
  publish = "docs"
  command = ""

# ── Production environment ─────────────────────────────────────────
[context.production]
  publish = "docs"
  command = ""

# ── Deploy previews (every pull request gets its own preview URL) ──
[context.deploy-preview]
  publish = "docs"
  command = ""

# ── Branch deploys (e.g. staging branch) ──────────────────────────
[context.branch-deploy]
  publish = "docs"
  command = ""

# ── Redirects ──────────────────────────────────────────────────────
# Serve index.html for any URL that doesn't match a real file.
# This makes direct URL access (e.g. /directory, /opportunities) work.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ── Security Headers ───────────────────────────────────────────────
# These are applied at the HTTP level (not just <meta> tags).
# securityheaders.com should show A+ with these in place.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Cache HTML files briefly (they change on deploy)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache CSS and JS for 1 year (Netlify cache-busts on deploy)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
