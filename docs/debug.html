<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listily — Deep Debug</title>
  <style>
    body { font-family: -apple-system, system-ui, monospace; max-width: 1100px; margin: 0 auto; padding: 1rem; background: #0a0a0a; color: #e0e0e0; }
    h1 { color: #4FD490; font-size: 22px; margin-bottom: 4px; }
    .lead { color: #888; font-size: 13px; margin-bottom: 1.5rem; }
    .section { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .section h2 { font-size: 15px; color: #4FD490; margin-bottom: .75rem; padding-bottom: 6px; border-bottom: 1px solid #2a2a2a; font-family: -apple-system, sans-serif; }
    .ok { color: #4FD490; }
    .fail { color: #ff6b6b; }
    .warn { color: #fbbf24; }
    .row { padding: 5px 0; font-size: 13px; font-family: monospace; border-bottom: 1px dotted #2a2a2a; display: flex; gap: 1rem; }
    .row .label { color: #888; min-width: 180px; }
    .row .val { color: #e0e0e0; word-break: break-all; }
    .copy-btn { background: #4FD490; color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    pre { background: #000; padding: 12px; border-radius: 4px; font-size: 11px; overflow-x: auto; color: #ddd; margin: 0; max-height: 350px; overflow-y: auto; }
    code { background: #2a2a2a; padding: 1px 6px; border-radius: 3px; font-size: 12px; color: #fbbf24; }
    .step { padding: 8px 12px; background: #0f0f0f; border-radius: 4px; margin-bottom: 6px; font-size: 12px; }
    .step.pass { border-left: 3px solid #4FD490; }
    .step.warn { border-left: 3px solid #fbbf24; }
    .step.fail { border-left: 3px solid #ff6b6b; }
  </style>
</head>
<body>
  <h1>🔬 Listily Deep Debug</h1>
  <p class="lead">Auto-tests data load, admin login, and every admin tab. Wait ~10 seconds for completion.</p>

  <div class="section"><h2>1. Page environment</h2><div id="env"></div></div>
  <div class="section"><h2>2. Data file</h2><div id="data"></div></div>
  <div class="section"><h2>3. Admin tabs (auto-tested)</h2><div id="tabs">Running test…</div></div>
  <div class="section"><h2>4. Captured logs</h2><pre id="log">(none)</pre>
    <button class="copy-btn" onclick="copyDebug()">📋 Copy full report</button>
    <span id="copy-status" style="font-size:12px;color:#4FD490;margin-left:10px"></span>
  </div>

  <iframe id="admin-frame" src="admin.html" style="width:1px;height:1px;border:0;opacity:0;position:absolute;left:-9999px"></iframe>

  <script>
    const logs = [];
    function addLog(type, msg) {
      logs.push({ time: new Date().toISOString().slice(11,23), type, msg: String(msg).substring(0,600) });
      document.getElementById('log').textContent = logs.map(l => '[' + l.time + '] ' + l.type.toUpperCase() + ': ' + l.msg).join('\n');
    }
    window.addEventListener('error', e => addLog('error', e.message + ' at ' + e.filename + ':' + e.lineno));
    window.addEventListener('unhandledrejection', e => addLog('promise-reject', String(e.reason)));

    function row(parent, label, val, cls) {
      const div = document.createElement('div');
      div.className = 'row';
      div.innerHTML = '<span class="label">' + label + '</span><span class="val ' + (cls||'') + '">' + val + '</span>';
      document.getElementById(parent).appendChild(div);
    }

    row('env', 'URL', location.href);
    row('env', 'UA', navigator.userAgent.substring(0, 100));
    row('env', 'Time', new Date().toISOString());

    // Load data.js
    const s = document.createElement('script');
    s.src = 'js/data.js?_t=' + Date.now();
    s.onload = () => {
      try {
        if (typeof DB !== 'undefined') {
          row('data', 'DB entries', DB.length, 'ok');
          row('data', 'Approved', DB.filter(b => b.status==='approved').length, 'ok');
          row('data', 'Pending', DB.filter(b => b.status==='pending').length);
        } else {
          row('data', 'DB', 'undefined in scope', 'warn');
        }
      } catch(e) { row('data', 'err', e.message, 'fail'); }
    };
    s.onerror = () => row('data', 'data.js', 'failed to load', 'fail');
    document.head.appendChild(s);

    // Test admin in iframe
    const frame = document.getElementById('admin-frame');
    frame.addEventListener('load', async () => {
      addLog('info', 'iframe loaded admin.html');
      await new Promise(r => setTimeout(r, 600));
      try {
        const fw = frame.contentWindow, fd = frame.contentDocument;
        const t = document.getElementById('tabs');
        t.innerHTML = '';

        // Check what version of admin.js is loaded
        const scripts = [...fd.querySelectorAll('script[src]')];
        const adminJsVer = scripts.find(sc => sc.src.includes('admin.js'))?.src.match(/\?v=(\d+)/);
        addLog('info', 'admin.js version: ' + (adminJsVer ? adminJsVer[1] : 'no version'));

        // Show what's deployed
        t.innerHTML += '<div class="step ' + (adminJsVer ? 'pass' : 'warn') + '">Cache version on deployed admin.js: <code>v=' + (adminJsVer ? adminJsVer[1] : '?') + '</code></div>';

        if (!fd.getElementById('a-user')) {
          t.innerHTML += '<div class="step fail">✗ #a-user input not found — admin.html DOM incomplete</div>';
          return;
        }

        // Login
        fd.getElementById('a-user').value = 'listly_admin';
        fd.getElementById('a-pass').value = 'ListlyAdmin123$';
        if (typeof fw.doLogin !== 'function') {
          t.innerHTML += '<div class="step fail">✗ doLogin() not found on admin window — admin.js missing or broken</div>';
          return;
        }
        fw.doLogin();
        await new Promise(r => setTimeout(r, 700));

        const dashVisible = fd.getElementById('admin-dash')?.style.display !== 'none';
        t.innerHTML += '<div class="step ' + (dashVisible ? 'pass' : 'fail') + '">Login → dashboard visible: <strong>' + dashVisible + '</strong></div>';
        if (!dashVisible) return;

        // Click each tab
        const tabs = ['pending','opp-pending','approved','opp-approved','rejected','expired','bulk-upload','reviews','edits','backend','analytics'];
        for (const tab of tabs) {
          try {
            const btn = fd.querySelector('button.atab[onclick*="\'' + tab + '\'"]');
            if (!btn) { t.innerHTML += '<div class="step warn">⚠ ' + tab + ': button missing</div>'; continue; }
            btn.click();
            await new Promise(r => setTimeout(r, 300));
            const pane = fd.getElementById('admin-pane-' + tab);
            if (!pane) { t.innerHTML += '<div class="step fail">✗ ' + tab + ': #admin-pane-' + tab + ' missing</div>'; continue; }
            const display = pane.style.display;
            const len = pane.innerHTML.length;
            const txt = (pane.innerText || '').substring(0, 80).replace(/\n/g, ' | ');
            const cls = (display === 'block' && len > 100) ? 'pass' : 'warn';
            t.innerHTML += '<div class="step ' + cls + '"><strong>' + tab + '</strong> · display=<code>' + display + '</code> · ' + len + ' chars<br><span style="color:#888;font-size:11px">' + txt + '</span></div>';
          } catch(e) {
            t.innerHTML += '<div class="step fail">✗ ' + tab + ': ' + e.message + '</div>';
            addLog('error', tab + ' click: ' + e.message);
          }
        }
      } catch (e) {
        addLog('error', 'inspection failed: ' + e.message);
        document.getElementById('tabs').innerHTML = '<div class="step fail">Inspection failed: ' + e.message + '</div>';
      }
    });

    function copyDebug() {
      const env = [...document.querySelectorAll('#env .row')].map(r => r.innerText).join('\n');
      const data = [...document.querySelectorAll('#data .row')].map(r => r.innerText).join('\n');
      const tabs = document.getElementById('tabs').innerText;
      const log = logs.map(l => '[' + l.time + '] ' + l.type.toUpperCase() + ': ' + l.msg).join('\n');
      const report = '=== LISTILY DEEP DEBUG REPORT ===\n' + 
        'Time: ' + new Date().toISOString() + '\n' +
        'URL: ' + location.href + '\n\n' +
        '=== ENV ===\n' + env + '\n\n' +
        '=== DATA ===\n' + data + '\n\n' +
        '=== ADMIN TABS ===\n' + tabs + '\n\n' +
        '=== LOGS ===\n' + log;
      navigator.clipboard.writeText(report).then(() => {
        document.getElementById('copy-status').textContent = '✓ Copied — paste in chat';
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = report; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
        document.getElementById('copy-status').textContent = '✓ Copied (fallback)';
      });
    }
  </script>
</body>
</html>
